apiVersion: apps/v1
kind: Deployment
metadata:
  name: university-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: university
  template:
    metadata:
      labels:
        app: university
    spec:
      containers:
      - name: university-container
        image: university-site
        ports:
        - containerPort: 80
